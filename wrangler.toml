name = "echo-fleet-commander"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "echo_metrics"

# D1 for fleet state, deployments, commands, audit log
[[d1_databases]]
binding = "DB"
database_name = "echo-fleet-commander"
database_id = "3d2bb239-87e4-47da-9aa4-6d1ae4c1edfc"

# KV for hot cache, session state, fleet snapshots
[[kv_namespaces]]
binding = "CACHE"
id = "cce3fcc589b54b14a477f6241ac0308a"

