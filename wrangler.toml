# Cron triggers — fleet monitoring + reporting
[triggers]
crons = [
  "*/5 * * * *",    # Every 5 min: fleet heartbeat + quick health
  "0 * * * *",      # Hourly: full fleet scan + metrics aggregation
  "0 */6 * * *",    # Every 6h: deep analysis + commander briefing
  "0 9 * * *",      # Daily 9am UTC: morning fleet report
  "0 0 * * SUN",    # Weekly Sunday: fleet week-in-review
]
